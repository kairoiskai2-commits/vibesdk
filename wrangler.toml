# wrangler.toml for VibeSDK Pages + Workers

name = "vibesdk-production"
type = "javascript"
compatibility_date = "2025-08-10"
compatibility_flags = ["nodejs_compat"]

# Frontend build config (for Pages)
[build]
command = "bun run build"
pages_build_output_dir = "dist"

# Global vars
[vars]
TEMPLATES_REPOSITORY = "https://github.com/cloudflare/vibesdk-templates"
ALLOWED_EMAIL = ""
DISPATCH_NAMESPACE = "vibesdk-default-namespace"
ENABLE_READ_REPLICAS = "true"
CLOUDFLARE_AI_GATEWAY = "vibesdk-gateway"
CUSTOM_DOMAIN = ""
MAX_SANDBOX_INSTANCES = "10"
SANDBOX_INSTANCE_TYPE = "standard-3"

# Platform capabilities
[vars.PLATFORM_CAPABILITIES.features.app]
enabled = true

[vars.PLATFORM_CAPABILITIES.features.presentation]
enabled = false

[vars.PLATFORM_CAPABILITIES.features.general]
enabled = false

[vars.PLATFORM_CAPABILITIES]
version = "1.0.0"

# Workers assets (optional if you have Worker scripts alongside frontend)
[build.upload]
format = "service-worker"

# Routes / custom domains
[[routes]]
pattern = "build.cloudflare.dev"
custom_domain = true

[[routes]]
pattern = "*build-preview.cloudflare.dev/*"
custom_domain = false
zone_id = "db01fac4261b2604aacad8410443a3e2"

# Workers dev / preview URLs
workers_dev = false
preview_urls = false
